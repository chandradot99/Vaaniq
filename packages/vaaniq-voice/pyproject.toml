[project]
name = "vaaniq-voice"
version = "0.1.0"
description = "Voice pipeline for Vaaniq — LiveKit Agents (PSTN + WebRTC)"
requires-python = ">=3.12"
dependencies = [
    "vaaniq-core>=0.1.0",
    "vaaniq-graph>=0.1.0",
    # LiveKit Agents + plugins
    "livekit-agents[deepgram,cartesia,elevenlabs,silero,azure,openai]>=1.5",
    # Azure Speech SDK (for Azure TTS — livekit-plugins-azure wraps it)
    "azure-cognitiveservices-speech>=1.40",
    # HTTP + WebSocket — Sarvam AI STT (streaming WebSocket) and TTS (HTTP)
    "httpx>=0.27",
    "websockets>=13.0",
    "pydantic>=2.0",
    "structlog>=24.0.0",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.12",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vaaniq"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
