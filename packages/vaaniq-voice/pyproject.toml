[project]
name = "vaaniq-voice"
version = "0.1.0"
description = "Voice pipeline for Vaaniq (Pipecat PSTN + LiveKit WebRTC)"
requires-python = ">=3.14"
dependencies = [
    "vaaniq-core>=0.1.0",
    "vaaniq-graph>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vaaniq"]
