[project]
name = "vaaniq-rag"
version = "0.1.0"
description = "RAG pipeline and vector DB connectors for Vaaniq"
requires-python = ">=3.14"
dependencies = [
    "vaaniq-core>=0.1.0",
    "langchain>=0.3.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vaaniq"]
