[project]
name = "vaaniq-voice-server"
version = "0.1.0"
description = "Standalone voice pipeline server — Twilio webhooks + Pipecat pipeline"
requires-python = ">=3.12"
dependencies = [
    "vaaniq-voice>=0.1.0",
    "vaaniq-server>=0.1.0",
    "fastapi>=0.115.0",
    "uvicorn>=0.30.0",
    "structlog>=24.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]
