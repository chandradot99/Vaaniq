[project]
name = "vaaniq-channels"
version = "0.1.0"
description = "Chat (SSE) and WhatsApp channel handlers for Vaaniq"
requires-python = ">=3.12"
dependencies = [
    "vaaniq-core>=0.1.0",
    "vaaniq-graph>=0.1.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vaaniq"]
