[project]
name = "naaviq-tools"
version = "0.1.0"
description = "Pre-built tool library for Naaviq agents"
requires-python = ">=3.12"
dependencies = [
    "naaviq-core>=0.1.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
crm       = ["hubspot-api-client>=9.0"]
payments  = ["razorpay>=1.4", "stripe>=7.0"]
calendar  = [
    "google-api-python-client>=2.0",
    "google-auth>=2.0",
    "google-auth-httplib2>=0.2",
    "google-auth-oauthlib>=1.0",
]
helpdesk  = []
ecommerce = []
messaging = ["twilio>=9.0", "slack-sdk>=3.0"]
dev       = ["pytest>=8.0", "pytest-asyncio>=0.24"]
all       = ["naaviq-tools[crm,payments,calendar,messaging]"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["naaviq"]
