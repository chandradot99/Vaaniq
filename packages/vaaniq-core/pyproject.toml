[project]
name = "vaaniq-core"
version = "0.1.0"
description = "Base classes and SessionState for Vaaniq"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24", "ruff>=0.4", "mypy>=1.10"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["vaaniq"]
