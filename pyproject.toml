[tool.uv.workspace]
members = [
    "packages/vaaniq-core",
    "packages/vaaniq-graph",
    "packages/vaaniq-voice",
    "packages/vaaniq-rag",
    "packages/vaaniq-tools",
    "packages/vaaniq-channels",
    "packages/vaaniq-server",
    # vaaniq-voice-server is excluded from this workspace — it deploys
    # independently to Fly.io and declares its own path dependencies.
    # Run: cd packages/vaaniq-voice-server && uv sync  (for local dev)
]

[tool.uv.sources]
vaaniq-core     = { workspace = true }
vaaniq-graph    = { workspace = true }
vaaniq-voice    = { workspace = true }
vaaniq-rag      = { workspace = true }
vaaniq-tools    = { workspace = true }
vaaniq-channels = { workspace = true }
vaaniq-server   = { workspace = true }

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.per-file-ignores]
# LLM prompt strings contain intentionally long lines
"packages/vaaniq-graph/vaaniq/graph/nodes/collect_data.py" = ["E501"]
# Admin constants: long default config values
"packages/vaaniq-server/vaaniq/server/admin/constants.py" = ["E501"]
# Tracing: long span/attribute names are part of the OTel schema
"packages/vaaniq-server/vaaniq/server/chat/tracing.py" = ["E501"]
# Chat service: long log messages and structured data
"packages/vaaniq-server/vaaniq/server/chat/service.py" = ["E501"]
# Tool implementations: long URLs and API strings
"packages/vaaniq-tools/vaaniq/tools/google/calendar.py" = ["E501"]
# Test files: long assertion messages and test data are acceptable
"packages/*/tests/**/*.py" = ["E501"]
"packages/*/tests/*.py" = ["E501"]
# conftest.py sets os.environ before app imports — E402 is intentional
"packages/*/tests/conftest.py" = ["E402"]

[tool.mypy]
python_version = "3.12"
strict = true

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]
