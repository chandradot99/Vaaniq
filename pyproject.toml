[tool.uv.workspace]
members = [
    "packages/naaviq-core",
    "packages/naaviq-graph",
    "packages/naaviq-voice",
    "packages/naaviq-rag",
    "packages/naaviq-tools",
    "packages/naaviq-channels",
    "packages/naaviq-server",
    "packages/naaviq-voice-server",
]

[tool.uv.sources]
naaviq-core         = { workspace = true }
naaviq-graph        = { workspace = true }
naaviq-voice        = { workspace = true }
naaviq-rag          = { workspace = true }
naaviq-tools        = { workspace = true }
naaviq-channels     = { workspace = true }
naaviq-server       = { workspace = true }
naaviq-voice-server = { workspace = true }

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.per-file-ignores]
# LLM prompt strings contain intentionally long lines
"packages/naaviq-graph/naaviq/graph/nodes/collect_data.py" = ["E501"]
# Admin constants: long default config values
"packages/naaviq-server/naaviq/server/admin/constants.py" = ["E501"]
# Tracing: long span/attribute names are part of the OTel schema
"packages/naaviq-server/naaviq/server/chat/tracing.py" = ["E501"]
# Chat service: long log messages and structured data
"packages/naaviq-server/naaviq/server/chat/service.py" = ["E501"]
# Tool implementations: long URLs and API strings
"packages/naaviq-tools/naaviq/tools/google/calendar.py" = ["E501"]
# Test files: long assertion messages and test data are acceptable
"packages/*/tests/**/*.py" = ["E501"]
"packages/*/tests/*.py" = ["E501"]
# conftest.py sets os.environ before app imports — E402 is intentional
"packages/*/tests/conftest.py" = ["E402"]

[tool.mypy]
python_version = "3.12"
strict = true

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]
