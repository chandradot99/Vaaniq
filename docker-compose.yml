# ── Local development ─────────────────────────────────────────────────────────
# Run infra only:   docker compose up postgres redis -d
# Run full stack:   docker compose up
#
# For local dev, run the server directly:
#   uv run uvicorn vaaniq.server.main:app --reload
#   uv run celery -A vaaniq.server.workers.celery_app worker  (Sprint 3+)

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vaaniq
      POSTGRES_PASSWORD: vaaniq
      POSTGRES_DB: vaaniq
    ports:
      - "5432:5432"     # exposed to localhost for local dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaaniq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"     # exposed to localhost for local dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0 --node-ip=127.0.0.1 --logging.level=info
    ports:
      - "7880:7880"     # WebSocket (ws://localhost:7880)
      - "7881:7881"     # TURN/TCP
      - "7882:7882/udp" # TURN/UDP
    environment:
      # Dev mode: static API key/secret (matches .env.example defaults)
      LIVEKIT_KEYS: "devkey: DnO_GaXa2xG4gEcUYullHAgrZ7AiyLqgb0xkFRXAZlI"

  # ── Application (full Docker stack only) ────────────────────────────────────
  # Not needed for local dev — use uv run uvicorn instead

  api:
    build:
      context: .
      dockerfile: packages/vaaniq-server/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override localhost URLs with Docker service names
      DATABASE_URL: postgresql+asyncpg://vaaniq:vaaniq@postgres:5432/vaaniq
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        uv run alembic -c packages/vaaniq-server/alembic.ini upgrade head &&
        uv run uvicorn vaaniq.server.main:app --host 0.0.0.0 --port 8000
      "

  # ── Worker (Sprint 3+ only — needed for document embedding & campaigns) ─────

  worker:
    build:
      context: .
      dockerfile: packages/vaaniq-server/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://vaaniq:vaaniq@postgres:5432/vaaniq
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run celery -A vaaniq.server.workers.celery_app worker --loglevel=info
    profiles:
      - worker   # only starts when explicitly requested: docker compose --profile worker up

volumes:
  postgres_data:
