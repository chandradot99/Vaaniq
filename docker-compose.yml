version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vaaniq
      POSTGRES_PASSWORD: vaaniq
      POSTGRES_DB: vaaniq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaaniq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/vaaniq-server/Dockerfile
    ports:
      - "8000:8000"
    env_file: packages/vaaniq-server/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        uv run alembic -c packages/vaaniq-server/alembic.ini upgrade head &&
        uv run uvicorn vaaniq.server.main:app --host 0.0.0.0 --port 8000
      "

  worker:
    build:
      context: .
      dockerfile: packages/vaaniq-server/Dockerfile
    env_file: packages/vaaniq-server/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run celery -A vaaniq.server.workers.celery_app worker --loglevel=info

volumes:
  postgres_data:
