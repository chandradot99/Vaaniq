name: Deploy

# Runs only after CI passes on main — never deploys a failing build.
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    # Skip if CI failed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      # railway up builds from the repo and deploys to Railway.
      # Railway then runs the releaseCommand (alembic upgrade head) from
      # railway.toml inside the new container before routing traffic to it.
      # --detach exits immediately — Railway handles the rollout asynchronously.
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service vaaniq-api --detach

  # Publish Docker image to ghcr.io on every deploy so self-hosters can
  # pull the latest image without building it themselves.
  publish-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/vaaniq-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/vaaniq-server:latest
            ghcr.io/${{ github.repository_owner }}/vaaniq-server:${{ github.event.workflow_run.head_sha }}
