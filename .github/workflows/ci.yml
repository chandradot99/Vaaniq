name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - vaaniq-core
          - vaaniq-graph
          - vaaniq-voice
          - vaaniq-rag
          - vaaniq-tools
          - vaaniq-channels

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install package
        run: uv sync --package ${{ matrix.package }}

      - name: Lint
        run: uvx ruff check packages/${{ matrix.package }}/

      - name: Test
        run: uv run --package ${{ matrix.package }} pytest packages/${{ matrix.package }}/tests/ -v || [ $? -eq 5 ]

  test-server:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vaaniq
          POSTGRES_PASSWORD: vaaniq
          POSTGRES_DB: vaaniq
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install all packages
        run: uv sync

      - name: Lint
        run: uvx ruff check packages/vaaniq-server/

      - name: Check migrations
        env:
          DATABASE_URL: postgresql+asyncpg://vaaniq:vaaniq@localhost:5432/vaaniq
          SECRET_KEY: test-secret
          FERNET_KEY: ""
        run: uv run alembic -c packages/vaaniq-server/alembic.ini upgrade head

      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://vaaniq:vaaniq@localhost:5432/vaaniq
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret
          FERNET_KEY: ""
        run: uv run pytest packages/vaaniq-server/tests/ -v
